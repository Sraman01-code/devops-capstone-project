[nosetests]
verbosity=2
with-spec=1
spec-color=1
with-coverage=1
cover-erase=1
cover-package=service

[coverage:run]
source = service
branch = False

[coverage:report]
show_missing = True

[flake8]
max-line-length = 127
max-complexity = 10
exclude = .git,__pycache__,venv,.venv,build,dist,.eggs

[pylint.messages_control]
disable = too-few-public-methods,
          cyclic-import

[pylint.format]
max-line-length = 127

[pylint.basic]
good-names = db, bp, id, app
